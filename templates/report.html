<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Report</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:42px;
}

.orange{
    color:#f97316;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:#111827;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

.card h2{
    color:#f97316;
    font-size:42px;
}

.analysis{
    background:#111827;
    padding:30px;
    border-radius:20px;
    margin-bottom:30px;
}

.analysis h2{
    margin-bottom:20px;
}

.analysis-content{
    white-space:pre-wrap;
    line-height:1.8;
    color:#d1d5db;
}

.home-btn{
    display:block;
    text-align:center;
    background:#f97316;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:12px;
    font-weight:600;
}

.home-btn:hover{
    opacity:.9;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <h1>
            Performance
            <span class="orange">Report</span>
        </h1>

    </div>

    <div class="cards">

        <div class="card">
            <h2>{{ score }}/5</h2>
            <p>Total Score</p>
        </div>

        <div class="card">
            <h2>{{ accuracy }}%</h2>
            <p>Accuracy</p>
        </div>

        <div class="card">
            <h2>
                {% if accuracy >= 80 %}
                    Ready
                {% elif accuracy >= 60 %}
                    Improving
                {% else %}
                    Practice
                {% endif %}
            </h2>
            <p>Placement Status</p>
        </div>

    </div>

    <div class="analysis">

        <h2>AI Analysis</h2>

        <div class="analysis-content">
            {{ analysis }}
        </div>

    </div>

    <a href="/" class="home-btn">
        Generate Another Test
    </a>

    <div class="footer">
        Powered by Flask • Ollama • Llama 3.2
    </div>

</div>

</body>
</html>
