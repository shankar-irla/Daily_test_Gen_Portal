<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generated Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.title{
    font-size:34px;
    font-weight:700;
}

.orange{
    color:#f97316;
}

.actions{
    display:flex;
    gap:15px;
}

.btn{
    text-decoration:none;
    background:#f97316;
    color:white;
    padding:12px 22px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:#111827;
    border-radius:20px;
    padding:25px;
    text-align:center;
    border:1px solid rgba(255,255,255,.08);
}

.stat-card h2{
    color:#f97316;
    font-size:32px;
}

.test-card{
    background:#111827;
    border-radius:20px;
    padding:30px;
    border:1px solid rgba(255,255,255,.08);
    margin-bottom:30px;
}

.test-card h2{
    margin-bottom:20px;
}

.paper-content{
    white-space:pre-wrap;
    line-height:1.9;
    color:#d1d5db;
    background:#0b1120;
    padding:25px;
    border-radius:15px;
    overflow:auto;
}

.form-card{
    background:#111827;
    border-radius:20px;
    padding:30px;
    border:1px solid rgba(255,255,255,.08);
}

.form-card h2{
    margin-bottom:25px;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:10px;
    color:#cbd5e1;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
    font-size:15px;
}

.submit-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#f97316;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.9;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#94a3b8;
}

@media(max-width:768px){

    body{
        padding:20px;
    }

    .header{
        gap:20px;
    }

    .title{
        font-size:28px;
    }

}

</style>

</head>
<body>

<div class="container">

    <div class="header">

        <div class="title">
            Daily Coding
            <span class="orange">Test</span>
        </div>

        <div class="actions">

            <a href="/download/pdf" class="btn">
                Download PDF
            </a>

            <a href="/download/docx" class="btn">
                Download DOCX
            </a>

        </div>

    </div>

    <div class="stats">

        <div class="stat-card">
            <h2>2</h2>
            <p>LeetCode Problems</p>
        </div>

        <div class="stat-card">
            <h2>3</h2>
            <p>Pseudocode MCQs</p>
        </div>

        <div class="stat-card">
            <h2>AI</h2>
            <p>Performance Analysis</p>
        </div>

    </div>

    <div class="test-card">

        <h2>Generated Test Paper</h2>

        <div class="paper-content">
            {{ paper }}
        </div>

    </div>

    <div class="form-card">

        <h2>Submit Performance</h2>

        <form action="/submit" method="POST">

            <div class="input-group">

                <label>
                    Coding Questions Solved (0 - 2)
                </label>

                <input
                    type="number"
                    name="coding"
                    min="0"
                    max="2"
                    required>

            </div>

            <div class="input-group">

                <label>
                    Pseudocode Correct (0 - 3)
                </label>

                <input
                    type="number"
                    name="pseudo"
                    min="0"
                    max="3"
                    required>

            </div>

            <button
                type="submit"
                class="submit-btn">

                Generate AI Report

            </button>

        </form>

    </div>

    <div class="footer">
        Powered by Flask • Ollama • Llama 3.2
    </div>

</div>

</body>
</html>
